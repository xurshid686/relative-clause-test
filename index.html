<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Relative Clause Quiz</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', Arial, sans-serif; background: #eef2ff; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
  .card { background: #fff; border-radius: 18px; box-shadow: 0 6px 32px rgba(60,80,200,.12); max-width: 680px; width: 100%; padding: 40px 36px; }
  h1 { color: #1e3a8a; font-size: 1.6rem; text-align: center; margin-bottom: 6px; }
  .sub { text-align: center; color: #64748b; font-size: .95rem; margin-bottom: 30px; }
  .screen { display: none; }
  .screen.active { display: block; }
  input[type=text] { width: 100%; padding: 13px 16px; border: 2px solid #c7d2fe; border-radius: 10px; font-size: 1rem; outline: none; transition: border .2s; margin-top: 8px; }
  input[type=text]:focus { border-color: #1e3a8a; }
  .btn { width: 100%; padding: 14px; background: #1e3a8a; color: #fff; border: none; border-radius: 10px; font-size: 1rem; font-weight: 600; cursor: pointer; margin-top: 20px; transition: background .2s; }
  .btn:hover { background: #1e40af; }
  .q-block { margin-bottom: 28px; }
  .q-text { font-weight: 600; color: #1e293b; margin-bottom: 12px; line-height: 1.5; }
  .q-num { color: #1e3a8a; margin-right: 5px; }
  .opt { display: flex; align-items: center; gap: 10px; padding: 9px 12px; border-radius: 8px; cursor: pointer; transition: background .15s; font-size: .97rem; color: #334155; }
  .opt:hover { background: #eef2ff; }
  .opt input { accent-color: #1e3a8a; width: 16px; height: 16px; flex-shrink: 0; }
  .divider { border: none; border-top: 1px solid #e2e8f0; margin: 20px 0; }
  /* Results */
  .score-wrap { text-align: center; padding: 20px 0 10px; }
  .score-num { font-size: 3.5rem; font-weight: 800; color: #1e3a8a; }
  .grade-badge { display: inline-block; font-size: 1.4rem; font-weight: 700; padding: 4px 18px; border-radius: 99px; margin-top: 8px; }
  .grade-A { background: #dcfce7; color: #166534; }
  .grade-B { background: #dbeafe; color: #1e40af; }
  .grade-C { background: #fef9c3; color: #854d0e; }
  .grade-D { background: #ffedd5; color: #9a3412; }
  .grade-F { background: #fee2e2; color: #991b1b; }
  .student-label { text-align: center; color: #64748b; margin-bottom: 4px; font-size: .95rem; }
  .tg-status { text-align: center; font-size: .9rem; margin: 14px 0 0; padding: 8px; border-radius: 8px; }
  .tg-ok { background: #dcfce7; color: #166534; }
  .tg-err { background: #fee2e2; color: #991b1b; }
  .tg-pending { background: #f1f5f9; color: #475569; }
  .results-title { font-weight: 700; color: #1e293b; margin: 28px 0 14px; font-size: 1rem; }
  .a-item { display: flex; gap: 10px; align-items: flex-start; padding: 10px 14px; border-radius: 8px; margin-bottom: 8px; font-size: .93rem; line-height: 1.55; }
  .a-item.ok { background: #f0fdf4; color: #166534; }
  .a-item.bad { background: #fff1f2; color: #9f1239; }
  .a-num { font-weight: 700; min-width: 24px; }
</style>
</head>
<body>
<div class="card">

  <!-- SCREEN 1: Name -->
  <div id="s-name" class="screen active">
    <h1>&#128218; Relative Clause Quiz</h1>
    <p class="sub">25 questions &middot; Multiple choice</p>
    <label for="sname" style="font-weight:600;color:#1e3a8a;">Your full name:</label>
    <input type="text" id="sname" placeholder="e.g. Kamola Yusupova" autocomplete="off">
    <button class="btn" onclick="goToQuiz()">Start Quiz &rarr;</button>
  </div>

  <!-- SCREEN 2: Quiz -->
  <div id="s-quiz" class="screen">
    <h1>&#128218; Relative Clause Quiz</h1>
    <p class="sub" id="quiz-sub"></p>
    <form id="qform"></form>
    <button class="btn" onclick="submitQuiz()">&#10003; Submit Answers</button>
  </div>

  <!-- SCREEN 3: Results -->
  <div id="s-result" class="screen">
    <h1>&#127881; Quiz Complete!</h1>
    <p class="student-label" id="r-name"></p>
    <div class="score-wrap">
      <div class="score-num" id="r-score"></div>
      <div><span class="grade-badge" id="r-grade"></span></div>
    </div>
    <div class="tg-status tg-pending" id="tg-msg">Sending report to teacher&#8230;</div>
    <p class="results-title">&#128203; Detailed Results:</p>
    <div id="r-list"></div>
  </div>

</div>
<script>
const QS = [
  { q:"The woman ___ lives next door is a doctor.", o:["who","which","whose","whom"], a:0 },
  { q:"This is the book ___ I told you about.", o:["who","which","whose","what"], a:1 },
  { q:"The student ___ bag was stolen reported it.", o:["who","which","whose","that"], a:2 },
  { q:"Is there anything ___ I can do for you?", o:["who","which","that","whose"], a:2 },
  { q:"The man ___ you met yesterday is my uncle.", o:["who","which","whose","what"], a:0 },
  { q:"She works in a hospital ___ was built in 1990.", o:["who","that","whose","whom"], a:1 },
  { q:"The people ___ live in this building are friendly.", o:["which","whose","who","what"], a:2 },
  { q:"I found the keys ___ I had lost.", o:["who","which","whose","what"], a:1 },
  { q:"He is the teacher ___ I respect the most.", o:["which","whose","what","whom"], a:3 },
  { q:"The car ___ she drives is very expensive.", o:["who","whose","that","what"], a:2 },
  { q:"Everything ___ he says is true.", o:["who","which","that","whom"], a:2 },
  { q:"That is the house ___ Jack built.", o:["who","that","whose","what"], a:1 },
  { q:"The city ___ I was born is beautiful.", o:["which","that","where","who"], a:2 },
  { q:"I remember the day ___ we first met.", o:["which","where","when","whose"], a:2 },
  { q:"The reason ___ she left is unknown.", o:["where","when","whose","why"], a:3 },
  { q:"A surgeon is a doctor ___ performs operations.", o:["which","whose","who","what"], a:2 },
  { q:"The film ___ we watched last night was boring.", o:["who","whom","which","whose"], a:2 },
  { q:"This is the girl ___ father is a pilot.", o:["who","which","that","whose"], a:3 },
  { q:"I don't like people ___ talk too much.", o:["which","whose","who","what"], a:2 },
  { q:"The letter ___ arrived this morning is for you.", o:["who","whose","which","what"], a:2 },
  { q:"The student ___ I gave the book to was grateful.", o:["which","whose","that","what"], a:2 },
  { q:"Is this the hotel ___ you stayed last summer?", o:["which","where","that","who"], a:1 },
  { q:"He told me something ___ surprised me a lot.", o:["who","whom","which","whose"], a:2 },
  { q:"The company ___ products are exported worldwide is local.", o:["that","which","whose","who"], a:2 },
  { q:"The time ___ we arrived, the show had already started.", o:["where","why","which","when"], a:3 }
];

let name = '', chosen = [];

function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function goToQuiz() {
  name = document.getElementById('sname').value.trim();
  if (!name) { alert('Please enter your name!'); return; }
  buildQuiz();
  document.getElementById('quiz-sub').textContent = 'Student: ' + name + ' · ' + QS.length + ' questions';
  show('s-quiz');
}

function buildQuiz() {
  const f = document.getElementById('qform');
  f.innerHTML = '';
  QS.forEach((q, i) => {
    const d = document.createElement('div');
    d.className = 'q-block';
    d.innerHTML = '<p class="q-text"><span class="q-num">' + (i+1) + '.</span>' + q.q + '</p>'
      + q.o.map((opt, j) =>
        '<label class="opt"><input type="radio" name="q' + i + '" value="' + j + '"> ' + opt + '</label>'
      ).join('');
    if (i < QS.length - 1) d.innerHTML += '<hr class="divider">';
    f.appendChild(d);
  });
}

function submitQuiz() {
  chosen = [];
  for (let i = 0; i < QS.length; i++) {
    const sel = document.querySelector('input[name="q' + i + '"]:checked');
    if (!sel) { alert('Please answer question ' + (i+1) + '!'); return; }
    chosen.push(parseInt(sel.value));
  }
  showResults();
}

function showResults() {
  let score = 0;
  const details = [];
  QS.forEach((q, i) => {
    const ok = chosen[i] === q.a;
    if (ok) score++;
    details.push({ qNum: i+1, correct: ok, chosen: q.o[chosen[i]], correctAnswer: q.o[q.a], questionText: q.q });
  });

  const pct = Math.round(score / QS.length * 100);
  const grade = pct >= 90 ? 'A' : pct >= 80 ? 'B' : pct >= 70 ? 'C' : pct >= 60 ? 'D' : 'F';
  const emoji = { A:'&#127942;', B:'&#129352;', C:'&#129353;', D:'&#128216;', F:'&#128213;' };

  document.getElementById('r-name').textContent = 'Student: ' + name;
  document.getElementById('r-score').textContent = score + ' / ' + QS.length;
  const gb = document.getElementById('r-grade');
  gb.className = 'grade-badge grade-' + grade;
  gb.innerHTML = emoji[grade] + ' Grade ' + grade + ' &middot; ' + pct + '%';

  const list = document.getElementById('r-list');
  list.innerHTML = '';
  details.forEach(d => {
    const el = document.createElement('div');
    el.className = 'a-item ' + (d.correct ? 'ok' : 'bad');
    el.innerHTML = '<span class="a-num">' + d.qNum + '.</span><span>'
      + d.questionText + '<br>'
      + (d.correct ? '&#10004; Correct: <b>' + d.correctAnswer + '</b>'
        : '&#10008; You chose: <b>' + d.chosen + '</b> &rarr; Correct: <b>' + d.correctAnswer + '</b>')
      + '</span>';
    list.appendChild(el);
  });

  show('s-result');
  sendReport(score, details);
}

async function sendReport(score, details) {
  const el = document.getElementById('tg-msg');
  try {
    const res = await fetch('/api/report', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ studentName: name, score, total: QS.length, answers: details })
    });
    const data = await res.json();
    if (data.ok) {
      el.textContent = '&#10003; Report sent to teacher!';
      el.className = 'tg-status tg-ok';
    } else {
      el.textContent = '&#9888; Could not send: ' + (data.error || 'unknown');
      el.className = 'tg-status tg-err';
    }
  } catch(e) {
    el.textContent = '&#9888; Network error. Report not sent.';
    el.className = 'tg-status tg-err';
  }
}
</script>
</body>
</html>
