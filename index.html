<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Relative Clause Quiz</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #f0f4ff; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .container { background: #fff; border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,0.10); max-width: 700px; width: 100%; padding: 36px 32px; }
    h1 { text-align: center; color: #2d3a8c; margin-bottom: 8px; font-size: 1.7rem; }
    .subtitle { text-align: center; color: #666; margin-bottom: 28px; font-size: 0.98rem; }
    #name-screen { display: block; }
    #quiz-screen { display: none; }
    #result-screen { display: none; }
    label { font-weight: 600; color: #2d3a8c; display: block; margin-bottom: 6px; }
    input[type=text] { width: 100%; padding: 12px 16px; border: 2px solid #c5cdf7; border-radius: 8px; font-size: 1rem; outline: none; transition: border 0.2s; }
    input[type=text]:focus { border-color: #2d3a8c; }
    .btn { display: block; width: 100%; padding: 13px; background: #2d3a8c; color: #fff; border: none; border-radius: 8px; font-size: 1.05rem; cursor: pointer; margin-top: 18px; transition: background 0.2s; }
    .btn:hover { background: #1a2460; }
    .question-block { margin-bottom: 26px; padding-bottom: 20px; border-bottom: 1px solid #eee; }
    .question-block:last-of-type { border-bottom: none; }
    .question-text { font-size: 1rem; font-weight: 600; color: #222; margin-bottom: 12px; }
    .q-num { color: #2d3a8c; margin-right: 6px; }
    .options label { font-weight: 400; color: #333; cursor: pointer; display: flex; align-items: center; gap: 8px; padding: 7px 10px; border-radius: 6px; margin-bottom: 4px; transition: background 0.15s; }
    .options label:hover { background: #f0f4ff; }
    .options input[type=radio] { accent-color: #2d3a8c; width: 17px; height: 17px; }
    .progress { text-align: right; color: #888; font-size: 0.88rem; margin-bottom: 18px; }
    #result-screen h2 { text-align: center; color: #2d3a8c; margin-bottom: 12px; font-size: 1.5rem; }
    .score-big { text-align: center; font-size: 3rem; font-weight: 700; color: #2d3a8c; margin: 10px 0; }
    .grade { text-align: center; font-size: 1.3rem; margin-bottom: 18px; }
    .answers-list { margin-top: 22px; }
    .answer-item { display: flex; gap: 10px; align-items: flex-start; margin-bottom: 10px; padding: 10px 12px; border-radius: 8px; font-size: 0.95rem; }
    .answer-item.correct { background: #e7fbe9; color: #1a7a2a; }
    .answer-item.wrong { background: #fdeaea; color: #b91c1c; }
    .answer-item .q-label { font-weight: 700; min-width: 26px; }
    .answer-item .detail { line-height: 1.5; }
    .telegram-status { text-align: center; margin-top: 14px; font-size: 0.93rem; color: #555; }
    .telegram-status.success { color: #1a7a2a; }
    .telegram-status.error { color: #b91c1c; }
  </style>
</head>
<body>
<div class="container">

  <!-- NAME SCREEN -->
  <div id="name-screen">
    <h1>📚 Relative Clause Quiz</h1>
    <p class="subtitle">25 questions · Multiple choice · Instant feedback</p>
    <label for="studentName">Enter your full name to begin:</label>
    <input type="text" id="studentName" placeholder="e.g. Aisha Karimova" autocomplete="off" />
    <button class="btn" onclick="startQuiz()">Start Quiz →</button>
  </div>

  <!-- QUIZ SCREEN -->
  <div id="quiz-screen">
    <h1>📚 Relative Clause Quiz</h1>
    <div class="progress" id="progress-text"></div>
    <form id="quiz-form"></form>
    <button class="btn" onclick="submitQuiz()">Submit Answers</button>
  </div>

  <!-- RESULT SCREEN -->
  <div id="result-screen">
    <h2>🎉 Quiz Complete!</h2>
    <div id="result-name" style="text-align:center;color:#555;margin-bottom:4px;"></div>
    <div class="score-big" id="score-display"></div>
    <div class="grade" id="grade-display"></div>
    <div class="telegram-status" id="telegram-status">Sending report to teacher...</div>
    <div class="answers-list" id="answers-list"></div>
  </div>

</div>

<script>
const questions = [
  { q: "The woman ___ lives next door is a doctor.", options: ["who","which","whose","whom"], answer: 0 },
  { q: "This is the book ___ I told you about.", options: ["who","which","whose","what"], answer: 1 },
  { q: "The student ___ bag was stolen reported it to the police.", options: ["who","which","whose","that"], answer: 2 },
  { q: "Is there anything ___ I can do for you?", options: ["who","which","that","whose"], answer: 2 },
  { q: "The man ___ you met yesterday is my uncle.", options: ["who","which","whose","what"], answer: 0 },
  { q: "She works in a hospital ___ was built in 1990.", options: ["who","that","whose","whom"], answer: 1 },
  { q: "The people ___ live in this building are very friendly.", options: ["which","whose","who","what"], answer: 2 },
  { q: "I found the keys ___ I had lost.", options: ["who","which","whose","what"], answer: 1 },
  { q: "He is the teacher ___ I respect the most.", options: ["which","whose","what","whom"], answer: 3 },
  { q: "The car ___ she drives is very expensive.", options: ["who","whose","that","what"], answer: 2 },
  { q: "Everything ___ he says is true.", options: ["who","which","that","whom"], answer: 2 },
  { q: "That is the house ___ Jack built.", options: ["who","that","whose","what"], answer: 1 },
  { q: "The city ___ I was born is beautiful.", options: ["which","that","where","who"], answer: 2 },
  { q: "I remember the day ___ we first met.", options: ["which","where","when","whose"], answer: 2 },
  { q: "The reason ___ she left is unknown.", options: ["where","when","whose","why"], answer: 3 },
  { q: "A surgeon is a doctor ___ performs operations.", options: ["which","whose","who","what"], answer: 2 },
  { q: "The film ___ we watched last night was boring.", options: ["who","whom","which","whose"], answer: 2 },
  { q: "This is the girl ___ father is a pilot.", options: ["who","which","that","whose"], answer: 3 },
  { q: "I don't like people ___ talk too much.", options: ["which","whose","who","what"], answer: 2 },
  { q: "The letter ___ arrived this morning is for you.", options: ["who","whose","which","what"], answer: 2 },
  { q: "The student ___ I gave the book to was grateful.", options: ["which","whose","that","what"], answer: 2 },
  { q: "Is this the hotel ___ you stayed last summer?", options: ["which","where","that","who"], answer: 1 },
  { q: "He told me something ___ surprised me a lot.", options: ["who","whom","which","whose"], answer: 2 },
  { q: "The company ___ products are exported worldwide is local.", options: ["that","which","whose","who"], answer: 2 },
  { q: "The time ___ we arrived, the show had already started.", options: ["where","why","which","when"], answer: 3 }
];

let studentName = '';
let userAnswers = [];

function startQuiz() {
  const nameInput = document.getElementById('studentName').value.trim();
  if (!nameInput) { alert('Please enter your name!'); return; }
  studentName = nameInput;
  document.getElementById('name-screen').style.display = 'none';
  document.getElementById('quiz-screen').style.display = 'block';
  renderQuiz();
}

function renderQuiz() {
  document.getElementById('progress-text').textContent = `${questions.length} Questions`;
  const form = document.getElementById('quiz-form');
  form.innerHTML = '';
  questions.forEach((q, i) => {
    const block = document.createElement('div');
    block.className = 'question-block';
    block.innerHTML = `<div class="question-text"><span class="q-num">${i+1}.</span>${q.q}</div>
      <div class="options">${q.options.map((opt, j) =>
        `<label><input type="radio" name="q${i}" value="${j}" /> ${opt}</label>`
      ).join('')}</div>`;
    form.appendChild(block);
  });
}

function submitQuiz() {
  const form = document.getElementById('quiz-form');
  userAnswers = [];
  let allAnswered = true;
  for (let i = 0; i < questions.length; i++) {
    const selected = form.querySelector(`input[name="q${i}"]:checked`);
    if (!selected) { allAnswered = false; break; }
    userAnswers.push(parseInt(selected.value));
  }
  if (!allAnswered) { alert('Please answer all questions before submitting!'); return; }
  showResults();
}

function showResults() {
  let score = 0;
  const answerData = [];
  questions.forEach((q, i) => {
    const isCorrect = userAnswers[i] === q.answer;
    if (isCorrect) score++;
    answerData.push({
      qNum: i + 1,
      correct: isCorrect,
      chosen: q.options[userAnswers[i]],
      correctAnswer: q.options[q.answer],
      questionText: q.q
    });
  });

  const pct = Math.round((score / questions.length) * 100);
  const grade = pct >= 90 ? '🏆 A' : pct >= 80 ? '🥈 B' : pct >= 70 ? '🥉 C' : pct >= 60 ? '📘 D' : '📕 F';

  document.getElementById('quiz-screen').style.display = 'none';
  document.getElementById('result-screen').style.display = 'block';
  document.getElementById('result-name').textContent = `Student: ${studentName}`;
  document.getElementById('score-display').textContent = `${score} / ${questions.length}`;
  document.getElementById('grade-display').textContent = `${grade} · ${pct}%`;

  const list = document.getElementById('answers-list');
  list.innerHTML = '<strong style="font-size:1rem;">📋 Detailed Results:</strong><br/><br/>';
  answerData.forEach(a => {
    const div = document.createElement('div');
    div.className = `answer-item ${a.correct ? 'correct' : 'wrong'}`;
    div.innerHTML = `<span class="q-label">${a.qNum}.</span>
      <span class="detail">${a.questionText.replace('___', `<strong>${a.chosen}</strong>`)}<br/>
      ${a.correct ? '✅ Correct!' : `❌ Your answer: <strong>${a.chosen}</strong> · Correct: <strong>${a.correctAnswer}</strong>`}
      </span>`;
    list.appendChild(div);
  });

  sendTelegramReport(score, answerData);
}

async function sendTelegramReport(score, answerData) {
  const statusEl = document.getElementById('telegram-status');
  try {
    const res = await fetch('/api/report', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        studentName,
        score,
        total: questions.length,
        answers: answerData
      })
    });
    const data = await res.json();
    if (data.success) {
      statusEl.textContent = '✅ Report sent to teacher via Telegram!';
      statusEl.className = 'telegram-status success';
    } else {
      statusEl.textContent = '⚠️ Could not send report: ' + (data.error || 'Unknown error');
      statusEl.className = 'telegram-status error';
    }
  } catch (e) {
    statusEl.textContent = '⚠️ Network error: Could not send report.';
    statusEl.className = 'telegram-status error';
  }
}
</script>
</body>
</html>
